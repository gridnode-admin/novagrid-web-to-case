<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Kontaktformular</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- reCAPTCHA -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <!-- JS -->
  <script src="script.js" defer></script>

</head>

<body>

  <div class="page-wrapper">

    <div class="form-container">

      <form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00D68000004Expa"
        method="POST"
        onsubmit="return beforeSubmit()"
        target="_top">

        <!-- ========================= -->
        <!-- Salesforce Hidden Fields -->
        <!-- ========================= -->

        <input type="hidden" name="orgid" value="00D68000004Expa">

        <input type="hidden"
          id="retURL"
          name="retURL"
          value="">

        <!-- Correct Case Record Type -->
        <input type="hidden"
          name="recordType"
          value="012TG000000Qp5J">

        <!-- Required Case Fields -->
        <input type="hidden"
          name="status"
          value="Neu">

        <input type="hidden"
          name="origin"
          value="Website">

        <input type="hidden"
          name="currencyIsoCode"
          value="CHF">

        <!-- Language Field -->
        <input type="hidden"
          id="language-field"
          name="00NTG000000Zj5W"
          value="D">

        <!-- ========================= -->
        <!-- Honeypot Anti-Spam Field -->
        <!-- ========================= -->

        <div class="hp-field" aria-hidden="true">

          <label for="website">
            Website
          </label>

          <input id="website"
            name="website"
            type="text"
            tabindex="-1"
            autocomplete="off">

        </div>

        <!-- ========================= -->
        <!-- Contact Information -->
        <!-- ========================= -->

        <label id="label-name" for="name">
          Vollständiger Name *
        </label>

        <input id="name"
          name="name"
          maxlength="80"
          required>

        <label id="label-email" for="email">
          E-Mail-Adresse *
        </label>

        <input id="email"
          name="email"
          type="email"
          maxlength="80"
          required>

        <label id="label-phone" for="phone">
          Telefonnummer *
        </label>

        <input id="phone"
          name="phone"
          maxlength="40"
          required>

        <!-- ========================= -->
        <!-- Solar-Log Serial Number -->
        <!-- ========================= -->

        <label id="label-serial" for="serial-number">
          Solar-Log Seriennummer *
        </label>

        <input id="serial-number"
          name="Solar_Log_Seriennummer__c"
          type="text"
          inputmode="numeric"
          pattern="[0-9]+"
          maxlength="20"
          required>

        <small class="form-hint">
          Nur Zahlen erlaubt.
        </small>

        <!-- ========================= -->
        <!-- Subject -->
        <!-- ========================= -->

        <label id="label-subject" for="subject">
          Betreff *
        </label>

        <input id="subject"
          name="subject"
          maxlength="80"
          required>

        <!-- ========================= -->
        <!-- Message -->
        <!-- ========================= -->

        <label id="label-message" for="description">
          Ihre Nachricht *
        </label>

        <textarea id="description"
          name="description"
          rows="5"
          maxlength="5000"
          required></textarea>

        <small id="form-hint" class="form-hint">
          Bitte beschreiben Sie Ihr Anliegen so genau wie möglich.
        </small>

        <!-- ========================= -->
        <!-- reCAPTCHA -->
        <!-- ========================= -->

        <div class="g-recaptcha"
          data-sitekey="6LeBW84sAAAAAK-GP1HY6iJwhgF2y1GVpH-MwhZR">
        </div>

        <!-- ========================= -->
        <!-- Submit -->
        <!-- ========================= -->

        <button id="submit-button"
          type="submit">

          SENDEN

        </button>

      </form>

    </div>

  </div>

  <!-- ========================= -->
  <!-- GDPR / Contact Notice -->
  <!-- ========================= -->

  <p class="small"
    style="padding: 20px; text-align: center; color: #666; font-size: 0.8rem;">

    ACHTUNG:
    Mit dem Absenden des Formulars bestätigen Sie ausdrücklich,
    dass Sie eine Kontaktaufnahme über die angegebenen
    Kontaktdaten wünschen.

  </p>

</body>

</html>
